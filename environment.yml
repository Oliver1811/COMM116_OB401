name: vision-agent
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=23.0
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - cudatoolkit=11.8  # or 12.1 depending on your GPU
  - pip:
      - transformers>=4.45.0,<5.0.0
      - accelerate>=0.27.0
      - bitsandbytes>=0.41.0
      - Pillow>=9.0.0
      - numpy>=1.24.0
      - opencv-python-headless>=4.8.0
      - scikit-image>=0.21.0
      - matplotlib>=3.7.0
      - tqdm>=4.65.0
      - psutil>=5.9.0
